# config.conf — centralized build/workflow configuration

# OpenWrt SDK
OPENWRT_SDK_URL=https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

# PassWall upstream and source repositories
PASSWALL_UPSTREAM_OWNER=Openwrt-Passwall
PASSWALL_UPSTREAM_REPO=openwrt-passwall
PASSWALL_LUCI_REPO=https://github.com/Openwrt-Passwall/openwrt-passwall
PASSWALL_PACKAGES_REPO=https://github.com/Openwrt-Passwall/openwrt-passwall-packages

# OpenWrt mirrors and feeds
OPENWRT_BASE_FEED_REPO=https://github.com/openwrt/openwrt.git
OPENWRT_PACKAGES_FEED_REPO=https://github.com/openwrt/packages.git
OPENWRT_LUCI_FEED_REPO=https://github.com/openwrt/luci.git
OPENWRT_ROUTING_FEED_REPO=https://github.com/openwrt/routing.git
OPENWRT_TELEPHONY_FEED_REPO=https://github.com/openwrt/telephony.git
OPENWRT_SOURCE_CDN_URL=https://sources.cdn.openwrt.org
OPENWRT_SOURCE_MIRROR_URL=https://sources.openwrt.org
GOPROXY=https://proxy.golang.org,https://goproxy.io,direct

# Host toolchains
GO_VERSION=1.26.1
RUST_TOOLCHAIN_VERSION=1.94.0

# Static package catalog pulled from openwrt-passwall-packages (expanded subpackages)
PASSWALL_ALL_PACKAGES=chinadns-ng,dns2socks,geoview,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev-ss-local,shadowsocks-libev-ss-redir,shadowsocks-libev-ss-server,shadowsocks-libev-ss-tunnel,shadowsocksr-libev-ssr-check,shadowsocksr-libev-ssr-local,shadowsocksr-libev-ssr-nat,shadowsocksr-libev-ssr-redir,shadowsocksr-libev-ssr-server,shadowsocks-rust-sslocal,shadowsocks-rust-ssmanager,shadowsocks-rust-ssserver,shadowsocks-rust-ssservice,shadowsocks-rust-ssurl,shadow-tls,simple-obfs-client,simple-obfs-server,sing-box,tcping,trojan-plus,tuic-client,v2ray-geoip,v2ray-geosite,v2ray-plugin,xray-core,xray-plugin

# Required compile components (always compiled)
PASSWALL_REQUIRED_PACKAGES=chinadns-ng,dns2socks,dnsmasq-full,hysteria,ipt2socks,kmod-nft-nat,kmod-nft-socket,kmod-nft-tproxy,nftables,sing-box,trojan-plus,xray-core

# Selected optional compile components (also compiled)
PASSWALL_OPTIONAL_SELECTED_PACKAGES=geoview,microsocks,naiveproxy,tcping,tuic-client,v2ray-geoip,v2ray-geosite,xray-plugin

# Unselected optional components (not compiled unless moved to selected list)
PASSWALL_OPTIONAL_UNSELECTED_PACKAGES=shadow-tls,simple-obfs-client,simple-obfs-server,v2ray-plugin,shadowsocks-libev-ss-local,shadowsocks-libev-ss-redir,shadowsocks-libev-ss-server,shadowsocks-libev-ss-tunnel,shadowsocksr-libev-ssr-check,shadowsocksr-libev-ssr-local,shadowsocksr-libev-ssr-nat,shadowsocksr-libev-ssr-redir,shadowsocksr-libev-ssr-server,shadowsocks-rust-sslocal,shadowsocks-rust-ssmanager,shadowsocks-rust-ssserver,shadowsocks-rust-ssservice,shadowsocks-rust-ssurl
