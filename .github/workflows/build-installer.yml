name: Build PassWall Installer

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*-[0-9]*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_REQUIRED_PACKAGES: '15'
  # Official checksum source: https://go.dev/dl/?mode=json&include=all
  GO_VERSION: '1.26.1'
  GO_SHA256_LINUX_AMD64: '031f088e5d955bab8657ede27ad4e3bc5b7c1ba281f05f245bcc304f327c987a'
  # Official checksum source: https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init.sha256
  RUST_TOOLCHAIN_VERSION: '1.94.0'
  RUSTUP_INIT_SHA256_LINUX_AMD64: '4acc9acc76d5079515b46346a485974457b5a79893cfb01112423c89aeb5aa10'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      run_name: ${{ steps.installer.outputs.run_name }}
    permissions:
      contents: write
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup environment
        run: |
          source scripts/utils.sh
          step_start "Setup environment"
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev gawk gettext unzip file \
            libssl-dev wget python3 python3-yaml git ca-certificates makeself zstd \
            || die "apt-get install failed"
          step_end

      - name: Install toolchains
        run: |
          source scripts/utils.sh
          step_start "Install toolchains"

          GO_VER="${GO_VERSION}"
          GO_TARBALL="go${GO_VER}.linux-amd64.tar.gz"
          CURRENT_GO=$(go version 2>/dev/null | awk '{print $3}' | sed 's/go//' || true)
          if [ "$CURRENT_GO" != "$GO_VER" ]; then
            retry 3 20 wget -q "https://go.dev/dl/${GO_TARBALL}" -O "/tmp/${GO_TARBALL}"
            printf '%s  %s\n' "$GO_SHA256_LINUX_AMD64" "/tmp/${GO_TARBALL}" | sha256sum -c - \
              || die "Go tarball checksum verification failed"
            sudo rm -rf /usr/local/go
            sudo tar -C /usr/local -xzf "/tmp/${GO_TARBALL}"
            rm -f "/tmp/${GO_TARBALL}"
          fi
          export PATH="/usr/local/go/bin:$PATH"
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          GO_ACTUAL=$(go version | awk '{print $3}' | sed 's/go//')
          [ "$GO_ACTUAL" = "$GO_VER" ] || die "Go verification failed: expected $GO_VER, got $GO_ACTUAL"

          RUST_VER="${RUST_TOOLCHAIN_VERSION}"
          if [ -f "$HOME/.cargo/env" ]; then
            source "$HOME/.cargo/env"
          fi
          if ! command -v rustup >/dev/null 2>&1; then
            RUSTUP_INIT="/tmp/rustup-init"
            retry 3 20 wget -q https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init -O "$RUSTUP_INIT"
            printf '%s  %s\n' "$RUSTUP_INIT_SHA256_LINUX_AMD64" "$RUSTUP_INIT" | sha256sum -c - \
              || die "rustup-init checksum verification failed"
            chmod +x "$RUSTUP_INIT"
            "$RUSTUP_INIT" -y --profile minimal --default-toolchain "$RUST_VER" --no-modify-path
            rm -f "$RUSTUP_INIT"
            source "$HOME/.cargo/env"
          fi
          retry 3 20 rustup toolchain install "$RUST_VER" --profile minimal --no-self-update
          rustup default "$RUST_VER"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          RUST_ACTUAL=$(rustc --version | awk '{print $2}')
          [ "$RUST_ACTUAL" = "$RUST_VER" ] || die "Rust verification failed: expected $RUST_VER, got $RUST_ACTUAL"
          cargo --version || die "Cargo verification failed"

          step_end

      - name: Build installer
        id: installer
        run: |
          chmod +x scripts/full-build.sh
          ./scripts/full-build.sh \
            --repo-root "$GITHUB_WORKSPACE" \
            --config "$GITHUB_WORKSPACE/config/openwrt-sdk.conf" \
            --payload-dir "$GITHUB_WORKSPACE/payload" \
            --output-dir "$GITHUB_WORKSPACE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installer.outputs.run_name }}
          path: ${{ steps.installer.outputs.run_name }}

      - name: Diagnostics
        if: always()
        run: |
          source scripts/utils.sh
          GO_VER=$(go version 2>/dev/null || echo N/A)
          RUST_VER=$(rustc --version 2>/dev/null || echo N/A)
          DISK_AVAIL=$(df -h / --output=avail | tail -1 | tr -d ' ')
          INSTALLER_INFO=""
          if [ -n "${RUN_NAME:-}" ] && [ -f "${RUN_NAME}" ]; then
            INSTALLER_INFO="${RUN_NAME} ($(du -h "${RUN_NAME}" | cut -f1))"
          fi
          log_info "Go: $GO_VER"
          log_info "Rust: $RUST_VER"
          log_info "Disk: $DISK_AVAIL"
          log_info "SDK: ${OPENWRT_SDK_URL:-not set}"
          log_info "PassWall tag: ${PASSWALL_VERSION_TAG_RAW:-not set}"
          if [ -n "$INSTALLER_INFO" ]; then
            log_info "Installer: $INSTALLER_INFO"
          else
            log_warn "Installer: not built"
          fi
          {
            echo "### Build Info"
            echo "- Go: $GO_VER"
            echo "- Rust: $RUST_VER"
            echo "- Disk: $DISK_AVAIL"
            echo "- SDK: \`${OPENWRT_SDK_URL:-not set}\`"
            echo "- PassWall tag: \`${PASSWALL_VERSION_TAG_RAW:-not set}\`"
            [ -n "$INSTALLER_INFO" ] \
              && echo "- Installer: $INSTALLER_INFO" \
              || echo "- Installer: not built"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.run_name }}
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## Run 文件使用方式 | Run File Usage
            将 `<RUN_FILE>.run` 替换为本次发布附件中的实际文件名。
            ```bash
            scp <RUN_FILE>.run root@openwrt:/tmp/
            ssh root@openwrt 'cd /tmp && chmod +x <RUN_FILE>.run && ./<RUN_FILE>.run'
            # Optional: restart service to apply changes
            ssh root@openwrt '/etc/init.d/passwall restart'
            ```
          files: ${{ needs.build.outputs.run_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
