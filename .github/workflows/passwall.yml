name: PassWall Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Workflow mode
        required: true
        default: build
        type: choice
        options:
          - build
          - sync-and-build
      tag:
        description: Optional PassWall tag override for build mode
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      config_path: ${{ steps.config.outputs.config_path }}
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Load centralized config
        id: config
        run: |
          source scripts/lib.sh
          load_config config/config.conf

          [ -n "${OPENWRT_SDK_URL:-}" ] || die "Missing required config key: OPENWRT_SDK_URL"

          printf 'config_path=%s\n' 'config/config.conf' >> "$GITHUB_OUTPUT"

  prepare-build:
    needs:
      - load-config
    if: always() && needs.load-config.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.context.outputs.should_build }}
      should_release: ${{ steps.context.outputs.should_release }}
      build_tag: ${{ steps.context.outputs.build_tag }}
      reason: ${{ steps.context.outputs.reason }}
    steps:
      - name: Resolve build context
        id: context
        uses: actions/github-script@v8
        env:
          UPSTREAM_OWNER: Openwrt-Passwall
          UPSTREAM_REPO: openwrt-passwall
          MANUAL_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || '' }}
          MANUAL_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        with:
          github-token: ${{ github.token }}
          script: |
            const eventName = context.eventName
            const manualMode = (process.env.MANUAL_MODE || '').trim()
            const manualTag = (process.env.MANUAL_TAG || '').trim()

            let buildTag = ''
            let shouldBuild = false
            let shouldRelease = false
            let reason = ''

            if (eventName === 'schedule' || manualMode === 'sync-and-build') {
              const upstreamOwner = process.env.UPSTREAM_OWNER
              const upstreamRepo = process.env.UPSTREAM_REPO
              const { owner, repo } = context.repo

              const { data: repoInfo } = await github.rest.repos.get({ owner, repo })
              const defaultBranch = repoInfo.default_branch
              const { data: branchInfo } = await github.rest.repos.getBranch({ owner, repo, branch: defaultBranch })
              const headSha = branchInfo.commit.sha
              core.info(`Using ${defaultBranch}@${headSha} for tag creation.`)

              const { data: release } = await github.rest.repos.getLatestRelease({ owner: upstreamOwner, repo: upstreamRepo })
              const upstreamTag = (release.tag_name || '').trim()
              if (!upstreamTag) {
                core.setFailed('Upstream latest stable tag is empty')
                return
              }

              const tag = upstreamTag.replace(/^v/, '')
              const shortRef = `tags/${tag}`
              let created = 'false'
              try {
                await github.rest.git.getRef({ owner, repo, ref: shortRef })
                core.info(`Tag ${tag} already exists, skip.`)
                created = 'false'
              } catch (error) {
                if (error.status !== 404) throw error
                try {
                  await github.rest.git.createRef({ owner, repo, ref: `refs/${shortRef}`, sha: headSha })
                  core.info(`Pushed new tag ${tag}.`)
                  created = 'true'
                } catch (error) {
                  const message = error?.response?.data?.message || error?.message || ''
                  if (error.status === 422 && message.includes('Reference already exists')) {
                    core.info(`Tag ${tag} already created by another run, skip.`)
                    created = 'false'
                  } else {
                    throw error
                  }
                }
              }

              if (created === 'true') {
                buildTag = tag
                shouldBuild = true
                shouldRelease = true
                reason = 'new upstream tag synced'
              } else {
                reason = 'latest upstream tag already exists locally'
              }
            } else {
              if (manualTag) {
                buildTag = manualTag
                reason = 'manual build with explicit tag'
              } else {
                const { data: release } = await github.rest.repos.getLatestRelease({ owner: process.env.UPSTREAM_OWNER, repo: process.env.UPSTREAM_REPO })
                buildTag = (release.tag_name || '').trim().replace(/^v/, '')
                reason = 'manual build with latest upstream stable tag'
              }
              shouldBuild = Boolean(buildTag)
            }

            core.setOutput('build_tag', buildTag)
            core.setOutput('should_build', shouldBuild ? 'true' : 'false')
            core.setOutput('should_release', shouldRelease ? 'true' : 'false')
            core.setOutput('reason', reason)
            await core.summary
              .addHeading('Build Context')
              .addRaw(`- Should build: \`${shouldBuild}\`\n`)
              .addRaw(`- Should release: \`${shouldRelease}\`\n`)
              .addRaw(`- Build tag: \`${buildTag || 'n/a'}\`\n`)
              .addRaw(`- Reason: ${reason || 'n/a'}\n`)
              .write()

  build:
    needs:
      - load-config
      - prepare-build
    if: needs.prepare-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      run_name: ${{ steps.installer.outputs.run_name }}
    env:
      GO_VERSION: 1.26.1
      RUST_TOOLCHAIN_VERSION: 1.94.0
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup environment
        run: |
          source scripts/lib.sh
          log_info "=== Setup environment ==="
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev gawk gettext unzip file \
            libssl-dev wget python3 git ca-certificates makeself zstd \
            curl \
            || die "apt-get install failed"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Install toolchains
        run: |
          source scripts/lib.sh
          log_info "=== Install toolchains ==="

          GO_VER="$GO_VERSION"
          GO_ACTUAL=$(go version | awk '{print $3}' | sed 's/go//')
          [ "$GO_ACTUAL" = "$GO_VER" ] || die "Go verification failed: expected $GO_VER, got $GO_ACTUAL"

          RUST_VER="$RUST_TOOLCHAIN_VERSION"
          if [ -f "$HOME/.cargo/env" ]; then
            source "$HOME/.cargo/env"
          fi
          if ! command -v rustup >/dev/null 2>&1; then
            retry 3 20 curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain "$RUST_VER"
            source "$HOME/.cargo/env"
          fi
          retry 3 20 rustup toolchain install "$RUST_VER" --profile minimal --no-self-update
          rustup default "$RUST_VER"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          RUST_ACTUAL=$(rustc --version | awk '{print $2}')
          [ "$RUST_ACTUAL" = "$RUST_VER" ] || die "Rust verification failed: expected $RUST_VER, got $RUST_ACTUAL"
          cargo --version || die "Cargo verification failed"

      - name: Build installer
        id: installer
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh \
            --config "$GITHUB_WORKSPACE/${{ needs.load-config.outputs.config_path }}" \
            --output-dir "$GITHUB_WORKSPACE" \
            --tag "${{ needs.prepare-build.outputs.build_tag }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installer.outputs.run_name }}
          path: ${{ steps.installer.outputs.run_name }}

      - name: Diagnostics
        if: always()
        run: |
          source scripts/lib.sh
          GO_VER=$(go version 2>/dev/null || echo N/A)
          RUST_VER=$(rustc --version 2>/dev/null || echo N/A)
          DISK_AVAIL=$(df -h / --output=avail | tail -1 | tr -d ' ')
          log_info "Go: $GO_VER | Rust: $RUST_VER | Disk: $DISK_AVAIL"
          log_info "SDK: ${OPENWRT_SDK_URL:-not set}"
          log_info "Tag: ${PASSWALL_VERSION_TAG_RAW:-not set}"
          log_info "Reason: ${{ needs.prepare-build.outputs.reason }}"
          {
            echo "### Build Info"
            echo "- Go: $GO_VER"
            echo "- Rust: $RUST_VER"
            echo "- Disk: $DISK_AVAIL"
            echo "- SDK: \`${OPENWRT_SDK_URL:-not set}\`"
            echo "- Tag: \`${PASSWALL_VERSION_TAG_RAW:-not set}\`"
            echo "- Reason: ${{ needs.prepare-build.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs:
      - prepare-build
      - build
    if: needs.prepare-build.outputs.should_release == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.run_name }}
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-build.outputs.build_tag }}
          body: |
            ## Run 文件使用方式 | Run File Usage
            将 `<RUN_FILE>.run` 替换为本次发布附件中的实际文件名。
            ```bash
            scp <RUN_FILE>.run root@openwrt:/tmp/
            ssh root@openwrt 'cd /tmp && chmod +x <RUN_FILE>.run && ./<RUN_FILE>.run'
            # Optional: restart service to apply changes
            ssh root@openwrt '/etc/init.d/passwall restart'
            ```
          files: ${{ needs.build.outputs.run_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
